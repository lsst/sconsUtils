name: build_and_test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build_and_test_conda:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          channels: conda-forge,defaults
          channel-priority: strict
          show-channel-urls: true

      - name: Install conda packages used by this package
        shell: bash -l {0}
        run: |
          conda install -y -q scons eups compilers ruff flake8

      # We have two cores so we can speed up the testing with xdist
      - name: Install pytest packages
        shell: bash -l {0}
        run: |
          conda install -y -q \
            pytest pytest-xdist pytest-cov pytest-session2file

      - name: List installed packages
        shell: bash -l {0}
        run: |
          conda list
          pip list -v

      - name: Build and test
        shell: bash -l {0}
        run: |
          setup -k -r .
          scons -j2
          python -c 'import importlib.metadata as M; print(M.version("lsst.sconsUtils"))'

      - name: Upload coverage to codecov
        uses: codecov/codecov-action@v5
        with:
          files: tests/.tests/pytest-sconsUtils.xml-cov-sconsUtils.xml
          token: ${{ secrets.CODECOV_TOKEN }}
  build_and_test_pip:
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Need to clone everything for the git tags.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "setup.cfg"
          allow-prereleases: true

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          pip install --upgrade pip uv
          uv pip install --system -r requirements.txt

      # We have two cores so we can speed up the testing with xdist
      - name: Install pytest packages
        shell: bash -l {0}
        run: |
          uv pip install --system pytest pytest-xdist

      - name: Build and install
        run: |
          uv pip install --system --no-deps -v -e .

      - name: Run tests
        run: |
          pytest --ignore=tests/test_simple.py -r a -v -n 3
